  <body>
    <main class="home-page">
      <div class="home-shell">
        <div class="home-brand-badge" aria-label="blob.bar">
          <span class="home-brand-badge-dot" aria-hidden="true"></span>
          <span class="home-brand-badge-wordmark">blob.bar</span>

            </div>

            <button

              class="home-stage-hitbox"

            <canvas id="home-blob-canvas" class="home-canvas" aria-hidden="true"></canvas>
            <svg

              width="100%"
              height="100%"
              viewBox="0 0 440 360"

              <rect x="0.5" y="0.5" width="439" height="359" fill="none" stroke="rgba(160,140,220,0.05)" stroke-width="0.5" />
            </svg>
            <div id="home-blob-panel" class="home-stage-panel" aria-hidden="true"></div>
          </div>

          <div class="home-legend">
            <div class="home-legend-row">
              <div class="home-legend-key">
                <span class="home-legend-dot" style="background-color: rgb(165, 148, 220)"></span>
                <span class="home-legend-label">Ephemeral Listings</span>

            </div>
            <div class="home-legend-row">

                <span class="home-legend-dot" style="background-color: rgb(135, 125, 185)"></span>

              </div>
              <div class="home-legend-meta">
                <span class="home-legend-size">28 FLOWS</span>
                <span class="home-legend-pct">28%</span>
              </div>
            </div>
            <div class="home-legend-row">
              <div class="home-legend-key">
                <span class="home-legend-dot" style="background-color: rgb(108, 100, 155)"></span>

              </div>
              <div class="home-legend-meta">
                <span class="home-legend-size">18 PROOFS</span>
                <span class="home-legend-pct">18%</span>

            <span class="home-protocol-arrow">→</span>

          <a href="/llms.txt" class="home-agent-text-link">for agents click here: llms.txt</a>
          <p class="home-caption">Poke the blob, then enter the live procurement rail.</p>
